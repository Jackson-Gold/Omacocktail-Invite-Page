name: Sync RSVP Data

on:
  push:
    branches: ["main"]
    paths:
      - ".github/rsvps/submissions/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build attendee files
        run: node scripts/build-attendees.mjs

      - name: Commit updated attendee files
        run: |
          if git diff --quiet -- data/public-attendees.json .github/rsvps/guest-log.json; then
            echo "No attendee changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/public-attendees.json .github/rsvps/guest-log.json
          git commit -m "Sync RSVP attendee data"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
