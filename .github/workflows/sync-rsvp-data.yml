name: Sync RSVP Data

on:
  push:
    branches: ["main"]
    paths:
      - ".github/rsvps/submissions/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build attendee files
        run: node scripts/build-attendees.mjs

      - name: Commit updated attendee files
        run: |
          if git diff --quiet -- .github/rsvps/guest-log.json; then
            echo "No attendee changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/rsvps/guest-log.json
          git commit -m "Sync RSVP attendee data"
          git push
